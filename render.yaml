# Render.com - Configuração do backend Python (Image Extractor)
# Doc: https://render.com/docs/blueprint-spec
#
# Setup inicial (uma única vez):
# 1. No painel Render: New + → Blueprint → seleciona o repo converter-pro
# 2. Render detecta este arquivo e provisiona o serviço automaticamente
# 3. Configure as envs SUPABASE_URL e SUPABASE_SERVICE_ROLE_KEY no Dashboard

services:
  - type: web
    name: converter-pro-image-extractor
    runtime: python
    rootDir: backend/image_extractor
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
